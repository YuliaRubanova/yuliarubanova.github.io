    image_link: "https://deepmind.google/blog/gemini-robotics-15-brings-ai-agents-into-the-physical-world/"
    impact: Advances general-purpose robots with motion transfer across embodiments and multi-level reasoning, connecting world understanding to executable action.
  - title: Direct Motion Models for Assessing Generated Videos
    authors: Kelsey Allen, Carl Doersch, Guangyao Zhou, Mohammed Suhail, Danny Driess, Ignacio Rocco, Yulia Rubanova, Thomas Kipf, Mehdi S. M. Sajjadi, Kevin Murphy, Joao Carreira, Sjoerd van Steenkiste
