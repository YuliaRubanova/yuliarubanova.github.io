intro:
  eyebrow: Staff Research Scientist · Google DeepMind
  title: Yulia Rubanova
  topics:
    - Video generation
    - Controllability
    - Personalisation
    - Physical reasoning
  summary:
    - >-
      I am a researcher at Google DeepMind, working on video generative models
      in GenAI. I work on pre-training for **Gemini Omni**, a frontier multimodal
      model released at Google I/O 2026. I focus on new capabilities and
      controls like reference images, audio, and editing.
    - >-
      Before Omni, I worked on **Veo**, including ingredient-to-video and Veo 3.1,
      building controllable video systems for character consistency, creative
      production, robotics evaluation, and physical world understanding.
    - >-
      I finished my PhD at the University of Toronto with Prof. Quaid Morris
      and David Duvenaud. I did multiple internships at Google Brain, including
      projects on discrete-variable RL for protein design and similarity
      networks for cancer prediction.
  vision_title: Research vision
  vision: >-
    Controllability, physical realism and runtime efficiency are crucial next
    steps for video world models. A leap in controllability is required to turn these models into
    reliable reasoning tools for real-world applications like robotics and will
    drive wider adoption of these models.

projects:
  - eyebrow: Google I/O 2026
    title: Gemini Omni
    subtitle: A native multimodal generation model for creating and editing video from any multimodal inputs like images, video, audio or text.
    image: assets/img/gemini_omni.jpg
    image_alt: Gemini Omni multimodal video generation preview
    image_fit: crop
    image_link: "https://deepmind.google/models/gemini-omni/"
    summary: >-
      On Gemini Omni, I worked on large-scale pre-training for new
      reference-driven capabilities, including image and audio conditioning,
      spanning data generation, training, inference, and evaluation.
  - eyebrow: Google I/O 2025
    title: Veo Ingredient-to-Video
    subtitle: Ingredient-driven video generation that preserves identity, motion, and intent.
    image: assets/img/veo_3_1_ingredients_to_video.png
    image_alt: Veo 3.1 Ingredients to Video visual
    image_link: "https://blog.google/innovation-and-ai/technology/ai/veo-3-1-ingredients-to-video/"
    summary: >-
      I was a core contributor to building Veo Ingredients from the ground up,
      enabling videos to be conditioned on **ingredient images** of characters,
      scenes, objects, textures, lighting, style, and more. I then co-led
      bringing this capability to Veo 3 and Veo 3.1, where the challenge was
      extending **character consistency** to videos with **sound**, including
      speaking characters, for the first time.

papers_intro: >-
  A short path through the work: Veo as world simulator, Gemini Robotics, video
  evaluation, 3D control, learned simulation, and Neural ODEs.

