intro:
  eyebrow: Staff Research Scientist · Google DeepMind
  title: Yulia Rubanova
  topics:
    - Video generative models
    - Controllability
    - Personalisation
    - Physical reasoning
  summary: >-
    I work on Veo, including ingredient-to-video and Veo 3.1, building
    controllable video systems for character consistency, creative production,
    robotics evaluation, and physical world understanding.
  vision_title: Research vision
  vision: >-
    My research builds toward world models that can predict, simulate, and
    support action in physical environments. I work on controllable video
    generation, learned simulation, object-centric scene structure, and
    robotics evaluation, with the goal of turning generative models into
    reliable tools for reasoning about the world.

project:
  eyebrow: Veo Ingredient-to-Video · Veo 3.1
  title: Veo Ingredient-to-Video
  subtitle: Ingredient-driven video generation that preserves identity, motion, and intent.
  image: assets/img/veo_3_1_ingredients_to_video.png
  image_alt: Veo 3.1 Ingredients to Video visual
  image_link: "https://blog.google/innovation-and-ai/technology/ai/veo-3-1-ingredients-to-video/"
  summary: >-
    My work connects ingredient-to-video generation, physical realism, and
    evaluation: from consistent characters and objects to video-based robotics
    simulation.
  points:
    - Character and object consistency
    - Realistic motion, physics, and audio-video generation
    - World simulation for robotics evaluation and safety testing

papers_intro: >-
  A short path through the work: Veo as world simulator, Gemini Robotics, video
  evaluation, 3D control, learned simulation, and Neural ODEs.

papers:
  - title: Evaluating Gemini Robotics Policies in a Veo World Simulator
    authors: Gemini Robotics Team, Coline Devin, Yilun Du, Debidatta Dwibedi, Ruiqi Gao, Abhishek Jindal, Thomas Kipf, Sean Kirmani, Fangchen Liu, Anirudha Majumdar, Andrew Marmon, Carolina Parada, Yulia Rubanova, Dhruv Shah, Vikas Sindhwani, Jie Tan, Fei Xia, Ted Xiao, Sherry Yang, Wenhao Yu, Allan Zhou
    venue: arXiv preprint
    year: 2025
    date: December 2025
    category: Veo world simulator
    media: "https://veo-robotics.github.io/static/videos/banner/banner-nominal.mp4"
    media_type: video
    image_alt: Veo world simulator robot policy evaluation demo
    link: "https://arxiv.org/abs/2512.10675"
    project_link: "https://veo-robotics.github.io/"
    impact: Shows Veo can become a scalable robotics evaluation environment, predicting policy rankings, out-of-distribution failures, and safety issues across 1600+ real-world trials.
  - title: "Gemini Robotics 1.5: Pushing the Frontier of Generalist Robots with Advanced Embodied Reasoning, Thinking, and Motion Transfer"
    authors: Gemini Robotics Team and 171 other authors
    venue: arXiv preprint
    year: 2025
    date: October 2025
    category: Generalist robotics
